<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body { margin: 0; font-family: "Segoe UI", sans-serif; background: #e9f5ff; color: #10233b; overflow: hidden; }
    header { background: #0d63aa; color: white; padding: 18px 22px; }
    h1 { margin: 0; font-size: 28px; }
    #status { margin-top: 4px; opacity: .92; }
    main { display: grid; place-items: center; height: calc(100vh - 92px); padding: 18px; overflow: hidden; }
    #board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: clamp(6px, 1.4vmin, 14px);
      width: min(calc(100vw - 36px), calc(100vh - 128px), 760px);
      aspect-ratio: 1;
    }
    button.cell {
      aspect-ratio: 1;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      border: 2px solid #1d6cae;
      border-radius: 10px;
      background: #ffffff;
      color: #0d63aa;
      font-size: clamp(48px, 14vw, 96px);
      font-weight: 800;
      box-shadow: 0 5px 16px #0d3b6624;
      background-size: cover;
      background-position: center;
    }
    button.cell.x { background-image: url("assets/x-piece.png"); color: transparent; }
    button.cell.o { background-image: url("assets/o-piece.png"); color: transparent; }
    button.cell.win { background-color: #fff4ba; }
    body.embedded header { padding: 8px 14px; min-height: 42px; }
    body.embedded h1 { display: none; }
    body.embedded main { height: calc(100vh - 42px); padding: 10px; }
    body.embedded #board { width: min(calc(100vw - 20px), calc(100vh - 62px), 820px); }
  </style>
</head>
<body>
  <header>
    <h1>Tic Tac Toe</h1>
    <div id="status">Connecting...</div>
  </header>
  <main><section id="board"></section></main>
  <script src="assets/colyseus.js"></script>
  <script src="assets/netbuddies-colyseus-compat.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    document.body.classList.toggle("embedded", params.get("embedded") === "1");
    const colyseusUrl = params.get("colyseus");
    const roomName = params.get("room") || "web_tic_tac_toe";
    const inviteRoomId = params.get("roomId") || "default";
    let symbol = params.get("side") === "host" ? "X" : "O";
    const board = Array(9).fill("");
    let turn = "X";
    let over = false;
    let lastResult = null;
    const status = document.querySelector("#status");
    const boardElement = document.querySelector("#board");
    let room = null;

    for (let i = 0; i < 9; i++) {
      const button = document.createElement("button");
      button.className = "cell";
      button.addEventListener("click", () => play(i, true));
      boardElement.appendChild(button);
    }

    connect();

    async function connect() {
      try {
        const client = new Colyseus.Client(colyseusUrl);
        room = await client.joinOrCreate(roomName, { roomId: inviteRoomId, roomKey: inviteRoomId, name: params.get("playerName") || "Buddy" });
        room.onMessage("hello", message => {
          symbol = message.symbol || symbol;
          if (message.board) {
            for (let i = 0; i < board.length; i++) board[i] = message.board[i] || "";
          }
          turn = message.turn || "X";
          over = message.phase === "ended";
          render();
        });
        room.onMessage("state", message => {
          if (message.board) {
            for (let i = 0; i < board.length; i++) board[i] = message.board[i] || "";
          }
          turn = message.turn || "X";
          over = message.phase === "ended";
          if (message.phase === "ended") {
            lastResult = message;
            showResult(message);
          }
          render();
        });
        room.onMessage("gameOver", message => {
          over = true;
          lastResult = message;
          if (message.board) for (let i = 0; i < board.length; i++) board[i] = message.board[i] || "";
          showResult(message);
          setTimeout(() => window.close(), message.reason === "opponent_left" ? 1600 : 5000);
        });
        room.onLeave(() => {
          if (!over) status.textContent = "Disconnected from game server.";
        });
        updateStatus();
      } catch (error) {
        status.textContent = `Could not join Colyseus room ${roomName}. Check ${colyseusUrl}.`;
      }
    }

    function play(index, local) {
      if (over || board[index] || (local && turn !== symbol)) return;
      board[index] = turn;
      if (local && room) {
        room.send("move", { index });
      }
      turn = turn === "X" ? "O" : "X";
      render();
    }

    function winner() {
      const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
      return lines.find(([a,b,c]) => board[a] && board[a] === board[b] && board[a] === board[c]) || null;
    }

    function render() {
      const win = winner();
      over = Boolean(win) || board.every(Boolean);
      [...boardElement.children].forEach((button, index) => {
        button.className = `cell ${board[index].toLowerCase()} ${win && win.includes(index) ? "win" : ""}`;
        button.textContent = board[index];
      });
      updateStatus(win);
    }

    function updateStatus(win = winner()) {
      if (win) status.textContent = `${board[win[0]]} wins. You are ${symbol}.`;
      else if (board.every(Boolean)) status.textContent = `Draw. You are ${symbol}.`;
      else if (lastResult) showResult(lastResult);
      else status.textContent = `You are ${symbol}. ${turn === symbol ? "Your turn." : "Waiting for buddy."}`;
    }

    function showResult(message) {
      if (message.reason === "opponent_left") status.textContent = "Buddy left. You win.";
      else if (!message.winnerSymbol) status.textContent = "Draw.";
      else status.textContent = message.winnerSymbol === symbol ? "You win." : "Buddy wins.";
    }

    render();
  </script>
</body>
</html>
