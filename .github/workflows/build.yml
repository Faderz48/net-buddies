name: Build Net Buddies

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build solution
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore NetBuddies.slnx

      - name: Build
        run: dotnet build NetBuddies.slnx --configuration Release --no-restore

      - name: Publish Windows client
        run: >
          dotnet publish NetBuddies.App/NetBuddies.App.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output publish/win-x64-client-installer-files

      - name: Download WebView2 runtime bootstrapper
        shell: pwsh
        run: >
          Invoke-WebRequest
          -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703"
          -OutFile publish/win-x64-client-installer-files/MicrosoftEdgeWebview2Setup.exe

      - name: Install Inno Setup
        run: choco install innosetup --no-progress --yes

      - name: Build Windows installer
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" packaging\netbuddies-client.iss'

      - name: Zip Windows client
        shell: pwsh
        run: Compress-Archive -Path publish/win-x64-client-installer-files/* -DestinationPath publish/NetBuddies-win-x64.zip -Force

      - name: Publish Windows server
        run: >
          dotnet publish NetBuddies.Server/NetBuddies.Server.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          --output publish/netbuddies-server-win-x64

      - name: Zip Windows server
        shell: pwsh
        run: Compress-Archive -Path publish/netbuddies-server-win-x64/* -DestinationPath publish/NetBuddies-Server-win-x64.zip -Force

      - name: Publish Windows server GUI
        run: >
          dotnet publish NetBuddies.Server.Gui/NetBuddies.Server.Gui.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=false
          --output publish/netbuddies-server-gui-win-x64

      - name: Zip Windows server GUI
        shell: pwsh
        run: Compress-Archive -Path publish/netbuddies-server-gui-win-x64/* -DestinationPath publish/NetBuddies-Server-Gui-win-x64.zip -Force

      - name: Upload Windows build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: net-buddies-windows
          path: |
            publish/NetBuddies-Client-Setup.exe
            publish/NetBuddies-win-x64.zip
            publish/NetBuddies-Server-win-x64.zip
            publish/NetBuddies-Server-Gui-win-x64.zip

  linux-server:
    name: Build Linux server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Publish Linux server
        run: >
          dotnet publish NetBuddies.Server/NetBuddies.Server.csproj
          --configuration Release
          --runtime linux-x64
          --self-contained true
          -p:PublishSingleFile=true
          --output publish/netbuddies-server-linux-x64

      - name: Publish Linux server GUI
        run: >
          dotnet publish NetBuddies.Server.Gui/NetBuddies.Server.Gui.csproj
          --configuration Release
          --runtime linux-x64
          --self-contained true
          -p:PublishSingleFile=true
          --output publish/netbuddies-server-gui-linux-x64

      - name: Create Linux server zip
        run: |
          cd publish/netbuddies-server-linux-x64
          zip -r ../NetBuddies-Server-linux-x64.zip .

      - name: Build AppDir
        run: |
          mkdir -p publish/NetBuddiesServer.AppDir/usr/bin
          cp -r publish/netbuddies-server-linux-x64/* publish/NetBuddiesServer.AppDir/usr/bin/
          cp -r publish/netbuddies-server-gui-linux-x64/* publish/NetBuddiesServer.AppDir/usr/bin/
          cp packaging/linux-server-appdir/AppRun publish/NetBuddiesServer.AppDir/AppRun
          cp packaging/linux-server-appdir/netbuddies-server.desktop publish/NetBuddiesServer.AppDir/netbuddies-server.desktop
          cp packaging/linux-server-appdir/netbuddies-server.svg publish/NetBuddiesServer.AppDir/netbuddies-server.svg
          chmod +x publish/NetBuddiesServer.AppDir/AppRun
          chmod +x publish/NetBuddiesServer.AppDir/usr/bin/NetBuddies.Server
          chmod +x publish/NetBuddiesServer.AppDir/usr/bin/NetBuddies.Server.Gui

      - name: Create Linux AppDir zip
        run: |
          cd publish/NetBuddiesServer.AppDir
          zip -r ../NetBuddies-Server-linux-x64-AppDir.zip .

      - name: Download appimagetool
        run: |
          curl --fail --location --retry 3 --output appimagetool-x86_64.AppImage https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          file appimagetool-x86_64.AppImage | grep -q ELF
          chmod +x appimagetool-x86_64.AppImage

      - name: Build Linux AppImage
        run: ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run publish/NetBuddiesServer.AppDir publish/NetBuddies-Server-x86_64.AppImage

      - name: Upload Linux server artifacts
        uses: actions/upload-artifact@v4
        with:
          name: net-buddies-linux-server
          path: |
            publish/NetBuddies-Server-linux-x64.zip
            publish/NetBuddies-Server-linux-x64-AppDir.zip
            publish/NetBuddies-Server-x86_64.AppImage

  linux-client:
    name: Build Linux client
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Publish Linux client
        run: >
          dotnet publish NetBuddies.App/NetBuddies.App.csproj
          --configuration Release
          --runtime linux-x64
          --self-contained true
          -p:PublishSingleFile=false
          --output publish/netbuddies-client-linux-x64

      - name: Build AppDir
        run: |
          mkdir -p publish/NetBuddiesClient.AppDir/usr/bin
          cp -r publish/netbuddies-client-linux-x64/* publish/NetBuddiesClient.AppDir/usr/bin/
          cp packaging/linux-client-appdir/AppRun publish/NetBuddiesClient.AppDir/AppRun
          cp packaging/linux-client-appdir/netbuddies-client.desktop publish/NetBuddiesClient.AppDir/netbuddies-client.desktop
          cp NetBuddies.App/Assets/netbuddies-256.png publish/NetBuddiesClient.AppDir/netbuddies-client.png
          chmod +x publish/NetBuddiesClient.AppDir/AppRun
          chmod +x publish/NetBuddiesClient.AppDir/usr/bin/NetBuddies.App

      - name: Create Linux client zips
        run: |
          cd publish/netbuddies-client-linux-x64
          zip -r ../NetBuddies-Client-linux-x64.zip .
          cd ../NetBuddiesClient.AppDir
          zip -r ../NetBuddies-Client-linux-x64-AppDir.zip .

      - name: Download appimagetool
        run: |
          curl --fail --location --retry 3 --output appimagetool-x86_64.AppImage https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          file appimagetool-x86_64.AppImage | grep -q ELF
          chmod +x appimagetool-x86_64.AppImage

      - name: Build Linux client AppImage
        run: ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run publish/NetBuddiesClient.AppDir publish/NetBuddies-Client-x86_64.AppImage

      - name: Upload Linux client artifacts
        uses: actions/upload-artifact@v4
        with:
          name: net-buddies-linux-client
          path: |
            publish/NetBuddies-Client-linux-x64.zip
            publish/NetBuddies-Client-linux-x64-AppDir.zip
            publish/NetBuddies-Client-x86_64.AppImage

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build
      - linux-server
      - linux-client
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: Net Buddies ${{ github.ref_name }}
          body: |
            Net Buddies ${{ github.ref_name }} release.

            Highlights:
            - Built-in TLS support in the server GUI.
            - Server GUI online/offline status indicator.
            - Modular web-game runtime with all current games loaded from game folders.
            - Refreshed Windows installer, Windows server GUI, Linux client AppImage, and Linux server GUI AppImage.
          files: release-assets/*
